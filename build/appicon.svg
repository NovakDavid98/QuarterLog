<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="24" x2="472" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4aa8ff"/>
      <stop offset="0.55" stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#0060df"/>
    </linearGradient>
    <linearGradient id="sheen" x1="256" y1="24" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="qfill" x1="150" y1="120" x2="360" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf3ff"/>
    </linearGradient>
  </defs>

  <!-- rounded app tile -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#sheen)"/>

  <!-- Q: ring + tail -->
  <g>
    <circle cx="248" cy="242" r="112" fill="none" stroke="url(#qfill)" stroke-width="46"/>
    <line x1="300" y1="296" x2="382" y2="378" stroke="url(#qfill)" stroke-width="46" stroke-linecap="round"/>
  </g>
</svg>
